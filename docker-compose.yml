version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: whatsapp_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: whatsapp_suite
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: whatsapp_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
