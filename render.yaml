services:
  - type: web
    name: whatsapp-suite-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install && cd ../frontend && npm install && npm run build
    startCommand: cd backend && NODE_ENV=production node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://your-frontend.onrender.com
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
    disk:
      name: whatsapp-sessions
      mountPath: /opt/render/project/src/backend/sessions
      sizeGB: 1
