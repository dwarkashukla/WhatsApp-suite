services:
  - type: web
    name: whatsapp-suite-backend
    env: node
    plan: free

    buildCommand: |
      cd backend
      npm ci
      cd ../frontend
      npm ci --include=dev
      npm run build

    startCommand: |
      cd backend
      node server.js

    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      - key: CLIENT_URL
        sync: false

      - key: MONGO_URI
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_REFRESH_SECRET
        generateValue: true